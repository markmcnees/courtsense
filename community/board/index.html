<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discussion Board · CourtSense</title>
<meta name="description" content="CourtSense Community discussion board. Read what players are saying and join the conversation.">
<meta name="robots" content="noindex">

<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="/auth.js"></script>
<!-- Shared site nav: three links only; page keeps its own Log Out (authControl:false). -->
<script>window.COURTSENSE_NAV = { variant: 'full', authControl: false };</script>
<script src="/nav.js"></script>

<style>
:root{
  --sand:#f5f0e8;--sand-dark:#ede5d5;--sand-border:#d9ceba;
  --navy:#1a3a6b;--navy-deep:#0f2347;--accent:#d4a843;
  --gray:#6b7280;--gray-light:#d1d5db;--gray-lighter:#f3f4f6;
  --white:#ffffff;--ink:#111827;
  --win:#047857;--win-bg:#d1fae5;--loss:#b91c1c;--loss-bg:#fee2e2;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.14);
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--sand);font-family:'Barlow',sans-serif;color:var(--ink);line-height:1.5;}

.hdr{background:linear-gradient(150deg,var(--navy-deep) 0%,var(--navy) 100%);padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,0.18);position:sticky;top:0;z-index:50;}
.hdr-inner{max-width:760px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.brand{display:flex;align-items:center;gap:10px;color:var(--accent);font-family:'Bebas Neue';font-size:20px;letter-spacing:2.5px;text-decoration:none;}
.brand img{height:30px;width:auto;}
.page-title{color:#fff;font-family:'Bebas Neue';font-size:18px;letter-spacing:2px;opacity:.85;}
.hdr-btn{background:rgba(255,255,255,.12);border:none;color:#fff;font-family:'Bebas Neue';font-size:13px;letter-spacing:1.5px;cursor:pointer;padding:8px 14px;border-radius:6px;min-height:36px;}
.hdr-btn:active{background:rgba(255,255,255,.2);}

main{max-width:760px;margin:0 auto;padding:24px 16px 60px;}

.section{background:var(--white);border-radius:var(--radius);padding:18px 18px;margin-bottom:14px;box-shadow:var(--shadow);}
.section h3{font-family:'Bebas Neue';font-size:15px;letter-spacing:1.5px;color:var(--navy);margin-bottom:4px;}
.section .sub{font-size:12px;color:var(--gray);margin-bottom:14px;}

.ta{width:100%;border:1px solid var(--sand-border);border-radius:10px;padding:12px 14px;font-family:'Barlow',sans-serif;font-size:15px;color:var(--ink);background:var(--white);resize:vertical;min-height:84px;line-height:1.5;}
.ta:focus{outline:none;border-color:var(--navy);}
.composer-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;flex-wrap:wrap;}
.charcount{font-size:12px;color:var(--gray);}
.charcount.over{color:var(--loss);font-weight:700;}
.err{font-size:13px;color:var(--loss);margin-top:8px;min-height:1px;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:14px 22px;border-radius:10px;border:none;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1.5px;cursor:pointer;min-height:50px;text-decoration:none;}
.btn-gold{background:var(--accent);color:var(--navy-deep);}
.btn-gold:active{filter:brightness(.95);}
.btn-gold:disabled{opacity:.55;cursor:default;}
.btn-sm{padding:9px 16px;min-height:38px;font-size:13px;}

.login-prompt{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.login-prompt .lp-text{font-size:14px;color:var(--gray);}

.empty{font-size:14px;color:var(--gray);padding:18px 2px;text-align:center;}

.msg{border:1px solid var(--sand-border);border-radius:12px;padding:14px 16px;margin-bottom:10px;background:var(--white);}
.msg:last-child{margin-bottom:0;}
.msg-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:6px;flex-wrap:wrap;}
.msg-author{font-weight:700;font-size:15px;color:var(--navy);word-break:break-word;}
.msg-date{font-size:12px;color:var(--gray);white-space:nowrap;}
.msg-text{font-size:15px;color:var(--ink);white-space:pre-wrap;word-break:break-word;}
.msg-del{margin-top:10px;background:var(--loss-bg);color:var(--loss);border:none;border-radius:6px;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:1px;padding:6px 12px;cursor:pointer;min-height:32px;}
.msg-del:active{filter:brightness(.95);}

.admin-gate{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--sand-border);}
.inp{width:100%;border:1px solid var(--sand-border);border-radius:10px;padding:12px 14px;font-family:'Barlow',sans-serif;font-size:15px;color:var(--ink);background:var(--white);margin-bottom:8px;}
.inp:focus{outline:none;border-color:var(--navy);}
.admin-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}

.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--navy-deep);color:#fff;font-size:14px;font-weight:600;padding:12px 20px;border-radius:10px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:100;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

.hidden{display:none;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <a href="/community" class="brand">
      <img src="/logo.png" alt="CourtSense" onerror="this.style.display='none'">
      <span>CourtSense</span>
    </a>
    <span class="page-title">Discussion Board</span>
    <span id="cs-nav" style="color:#fff;"></span>
    <button class="hdr-btn" id="logout-btn" onclick="doLogout()" style="display:none;">Log Out</button>
  </div>
</div>

<main>

  <!-- Composer: logged-in players only -->
  <section class="section hidden" id="composer">
    <h3>Start a post</h3>
    <div class="sub" id="composer-as"></div>
    <textarea class="ta" id="composer-text" maxlength="2000" placeholder="Share a game, a question, or a heads up for the community." oninput="updateCount()"></textarea>
    <div class="err" id="composer-err"></div>
    <div class="composer-foot">
      <span class="charcount" id="charcount">0/2000</span>
      <button class="btn btn-gold btn-sm" id="post-btn" onclick="doPost()">Post</button>
    </div>
  </section>

  <!-- Login prompt: logged-out visitors (board still readable below) -->
  <section class="section" id="login-prompt">
    <div class="login-prompt">
      <span class="lp-text">Reading the board is open to everyone. Log in to post.</span>
      <button class="btn btn-gold btn-sm" onclick="openLogin()">Log in to post</button>
    </div>
  </section>

  <!-- Message list: open to all -->
  <section class="section">
    <h3>Community posts</h3>
    <div class="sub">Newest first.</div>
    <div id="list"><div class="empty">Loading...</div></div>
  </section>

  <!-- Admin tools (PIN-gated delete), mirrors community/feedback convention -->
  <section class="section">
    <div class="admin-row">
      <button class="hdr-btn" id="admin-btn" style="background:var(--gray-lighter);color:var(--navy);" onclick="toggleAdmin()">Admin</button>
      <span class="sub" style="margin:0;">Admin tool for moderating posts.</span>
    </div>
    <div class="admin-gate" id="admin-gate">
      <input class="inp" id="pin-input" type="password" inputmode="numeric" placeholder="PIN" autocomplete="off" onkeypress="if(event.key==='Enter')checkPin()">
      <div class="err" id="pin-err"></div>
      <button class="btn btn-gold btn-sm" onclick="checkPin()">Unlock</button>
    </div>
  </section>

</main>

<div class="toast" id="toast"></div>

<script>
// CourtSense Community discussion board.
// Reads tally_kotb_pickup/messages openly (anyone can view). The composer renders
// only for a logged-in player. Admin delete sits behind PIN 8675, mirroring the
// community/feedback convention. Flat message shape only:
//   tally_kotb_pickup/messages/$msgId = { authorKey, authorName, text, createdAt }
// All user-controlled strings render through esc() to prevent injection.

const FB_CFG = {
  apiKey: "AIzaSyC8Ue06XPvGXo1XTloewPvDRBWtK5tDAj8",
  authDomain: "leon-beach-volleyball.firebaseapp.com",
  databaseURL: "https://leon-beach-volleyball-default-rtdb.firebaseio.com",
  projectId: "leon-beach-volleyball",
  storageBucket: "leon-beach-volleyball.firebasestorage.app",
  messagingSenderId: "937804799976",
  appId: "1:937804799976:web:02121e68655b4febeb8e5d"
};
const ROSTER_PATH   = 'tally_kotb_pickup/players';
const MESSAGES_PATH = 'tally_kotb_pickup/messages';
const ADMIN_PIN     = '8675';
const MAX_LEN       = 2000;

let db = null;
let currentPid = null;
let currentDisplayName = '';
let adminMode = false;
let _all = {};

const $ = id => document.getElementById(id);

// Verbatim from community/dashboard and community/feedback.
function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}
// Verbatim from community/feedback.
function fmtDateTime(ms){
  const n = (typeof ms === 'number' && isFinite(ms)) ? ms : null;
  if(n == null) return 'Unknown date';
  try { return new Date(n).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}); }
  catch(e){ return 'Unknown date'; }
}

// Resolve a display string from either record shape (mirrors community/profile and dashboard).
function displayNameOf(p){
  p = p || {};
  if(typeof p.displayName === 'string' && p.displayName.trim()) return p.displayName.trim();
  const n = p.name;
  if(n && typeof n === 'object'){
    const full = ((n.first || '') + ' ' + (n.last || '')).trim();
    if(full) return full;
  }
  if(typeof n === 'string' && n.trim()) return n.trim();
  const email = (typeof p.email === 'string' && p.email)
    || (p.emails && typeof p.emails.primary === 'string' && p.emails.primary) || '';
  if(email && email.indexOf('@') > 0) return email.slice(0, email.indexOf('@'));
  return 'Player';
}

function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2400); }

// ── COMPOSER VISIBILITY ─────────────────────────────────────────────────────
function showComposer(){
  $('composer').classList.remove('hidden');
  $('login-prompt').classList.add('hidden');
  $('composer-as').textContent = currentDisplayName ? ('Posting as ' + currentDisplayName) : '';
}
function hideComposer(){
  $('composer').classList.add('hidden');
  $('login-prompt').classList.remove('hidden');
}
function openLogin(){ if(window.CourtSenseAuth) CourtSenseAuth.showLogin(); }
function doLogout(){ if(window.CourtSenseAuth) CourtSenseAuth.logout(); }

function updateCount(){
  const len = ($('composer-text').value || '').length;
  const el = $('charcount');
  el.textContent = len + '/' + MAX_LEN;
  el.classList.toggle('over', len > MAX_LEN);
}

// ── MESSAGE LIST (open to all) ──────────────────────────────────────────────
function renderMessages(){
  const list = $('list');
  const rows = Object.keys(_all || {})
    .map(id => ({ id, m: _all[id] }))
    .filter(x => x.m && typeof x.m === 'object')
    .sort((a, b) => (b.m.createdAt || 0) - (a.m.createdAt || 0));

  if(!rows.length){
    list.innerHTML = '<div class="empty">No posts yet. Be the first to say something.</div>';
    return;
  }

  list.innerHTML = rows.map(({ id, m }) => {
    const author = esc(m.authorName || 'Player');
    const when = esc(fmtDateTime(m.createdAt));
    const text = esc(m.text || '');
    const del = adminMode
      ? '<button class="msg-del" onclick="delMsg(\'' + id + '\')">Delete</button>'
      : '';
    return '<div class="msg">'
      + '<div class="msg-top"><span class="msg-author">' + author + '</span>'
      + '<span class="msg-date">' + when + '</span></div>'
      + '<div class="msg-text">' + text + '</div>'
      + del
      + '</div>';
  }).join('');
}

// ── POST (logged-in only, write-confirmed) ──────────────────────────────────
function doPost(){
  const ta = $('composer-text');
  const err = $('composer-err');
  err.textContent = '';
  if(!currentPid){ err.textContent = 'Please log in to post.'; return; }
  const text = (ta.value || '').trim();
  if(!text){ return; }
  if(text.length > MAX_LEN){ err.textContent = 'Message must be ' + MAX_LEN + ' characters or fewer.'; return; }

  const btn = $('post-btn');
  btn.disabled = true;
  // Write-confirmed: success only fires after the write resolves; failure on catch.
  db.ref(MESSAGES_PATH).push().set({
    authorKey: currentPid,
    authorName: currentDisplayName,
    text: text,
    createdAt: Date.now()
  })
  .then(() => { ta.value = ''; updateCount(); toast('Posted'); })
  .catch(e => { console.error('post failed', e); err.textContent = "Couldn't post. Try again."; })
  .finally(() => { btn.disabled = false; });
}

// ── ADMIN (PIN-gated delete), mirrors community/feedback ────────────────────
function toggleAdmin(){
  if(adminMode){
    adminMode = false;
    $('admin-btn').textContent = 'Admin';
    $('admin-gate').style.display = 'none';
    renderMessages();
    return;
  }
  const g = $('admin-gate');
  g.style.display = (g.style.display === 'block') ? 'none' : 'block';
  if(g.style.display === 'block'){ $('pin-input').focus(); }
}
function checkPin(){
  const v = ($('pin-input').value || '').trim();
  if(v !== ADMIN_PIN){
    $('pin-err').textContent = 'Wrong PIN';
    $('pin-input').value = '';
    $('pin-input').focus();
    return;
  }
  $('pin-err').textContent = '';
  $('pin-input').value = '';
  $('admin-gate').style.display = 'none';
  adminMode = true;
  $('admin-btn').textContent = 'Admin on';
  renderMessages();
}
function delMsg(id){
  if(!adminMode) return;
  if(!confirm('Delete this post?')) return;
  db.ref(MESSAGES_PATH + '/' + id).remove()
    .then(() => toast('Deleted'))
    .catch(e => { console.error('delete failed', e); toast("Couldn't delete. Try again."); });
}

// ── AUTH ────────────────────────────────────────────────────────────────────
function onLogin(player){
  currentPid = player.id;
  currentDisplayName = player.displayName || displayNameOf(player);
  $('logout-btn').style.display = 'inline-flex';
  showComposer();
}
function onLogout(){
  currentPid = null;
  currentDisplayName = '';
  $('logout-btn').style.display = 'none';
  hideComposer();
}

document.addEventListener('DOMContentLoaded', () => {
  if(!firebase.apps.length) firebase.initializeApp(FB_CFG);
  db = firebase.database();

  // Reads are open to all: attach the messages listener regardless of login.
  db.ref(MESSAGES_PATH).on('value', snap => {
    _all = snap.val() || {};
    renderMessages();
  }, err => {
    console.error('messages read failed', err);
    $('list').innerHTML = '<div class="empty">Could not load posts. Refresh and try again.</div>';
  });

  // autoShowLogin:false keeps the page public. onLogin fires only if a session
  // is restored; logged-out visitors still read the board and see "Log in to post".
  CourtSenseAuth.init({
    firebaseDb: db,
    rosterPath: ROSTER_PATH,
    autoShowLogin: false,
    onLogin,
    onLogout
  });
});
</script>
</body>
</html>
