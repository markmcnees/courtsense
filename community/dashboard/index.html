<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>This page moved to courtsense.app/community/profile</title>
<meta name="robots" content="noindex">
<!-- The dashboard merged into the unified profile at /community/profile/ (Overview
     tab). This stub forwards old bookmarks and links. The JS redirect preserves the
     query string and hash (e.g. ?firstTime=1), which a bare meta refresh would drop.
     The meta refresh is a no-JS fallback only. -->
<script>location.replace('/community/profile/' + location.search + location.hash);</script>
<meta http-equiv="refresh" content="0; url=/community/profile/">
<style>
  html,body{margin:0;height:100%;background:#0f2347;color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
  .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;text-align:center;}
  .card{max-width:420px;}
  h1{font-size:20px;margin:0 0 12px;letter-spacing:.5px;}
  p{font-size:15px;line-height:1.5;color:#cbd5e1;margin:0 0 18px;}
  a.btn{display:inline-block;background:#d4a843;color:#0f2347;font-weight:700;
    text-decoration:none;padding:13px 22px;border-radius:10px;font-size:15px;}
  a.plain{color:#d4a843;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Your dashboard moved to your profile</h1>
      <p>Your rating, leaderboard, and games now live on the Overview tab of your profile. Redirecting you now. If you are not redirected,
         <a class="plain" href="/community/profile/">tap here</a>.</p>
      <a class="btn" href="/community/profile/">Go to your profile</a>
    </div>
  </div>
</body>
</html>
