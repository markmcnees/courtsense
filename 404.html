<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<style>
  /* Boot overlay only. Kept off <body> so it never interferes with the app.js
     layout once the shell paints; the navy <html> background prevents any flash
     of white between overlay removal and app.js rendering. */
  html{background:#082A4F;}
  .cs-boot{
    position:fixed;inset:0;z-index:9999;
    background:#082A4F;color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-family:'Barlow',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    text-align:center;padding:24px;box-sizing:border-box;
  }
  .cs-boot .inner{max-width:420px;}
  .cs-boot .load{font-size:15px;letter-spacing:.04em;color:#cdd8e6;}
  .cs-boot h1{
    font-family:'Bebas Neue',sans-serif;font-weight:400;
    font-size:42px;letter-spacing:1.5px;line-height:1.05;
    margin:0 0 14px;color:#fff;
  }
  .cs-boot p{font-size:15px;line-height:1.6;color:#cdd8e6;margin:0 0 10px;}

  /* Coming-soon signup page (/<slug>/signup/). Same overlay element, repainted in
     the school's primary color with white text. Fonts match the app. */
  .cs-signup .inner{max-width:480px;}
  .cs-signup .cs-logo{margin:0 0 22px;}
  .cs-signup .cs-logo img{
    width:140px;height:140px;box-sizing:border-box;object-fit:contain;display:inline-block;
    background:#fff;padding:22px;border-radius:50%;box-shadow:0 6px 24px rgba(0,0,0,.22);
  }
  .cs-signup .cs-emoji{font-size:104px;line-height:1;}
  .cs-signup h1{
    font-family:'Bebas Neue',sans-serif;font-weight:400;
    font-size:52px;letter-spacing:2px;line-height:1.02;
    margin:0 0 6px;color:#fff;
  }
  .cs-signup .cs-sub{
    font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;
    text-transform:uppercase;color:rgba(255,255,255,.85);margin:0 0 26px;
  }
  .cs-signup .cs-msg{font-size:17px;line-height:1.6;color:#fff;margin:0 0 40px;}
  .cs-signup .cs-powered{
    display:inline-block;font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    color:rgba(255,255,255,.7);text-decoration:none;
  }
  .cs-signup .cs-powered:hover{color:rgba(255,255,255,.95);}
</style>
</head>
<body>
<div class="cs-boot" id="cs-boot"><div class="inner"><div class="load">Loading...</div></div></div>
<script>
/* Generic school shell.
   GitHub Pages serves this 404.html for any path with no matching real file, so
   courtsense.app/<slug>/ lands here. Real per-school folders still win (they are
   actual files), so this only handles slugs that have no folder. It reads the
   slug's config from Firebase, re-attaches the shared fbConfig (stripped during
   migration), sets window.SCHOOL_CONFIG, then injects app.js. app.js reads
   window.SCHOOL_CONFIG at parse time, so the config MUST be set before the tag
   is appended.

   Two paths off the same config read:
     /<slug>/          -> boot the school app (unchanged)
     /<slug>/signup/   -> render a branded coming-soon page (no app.js) */
(function(){
  // Shared Firebase project config, identical across every school (copied from the
  // per-school shells). This is the ONLY thing needed to connect and read the
  // per-slug config, so it is safe to hardcode here.
  var FB_CONFIG={apiKey:'AIzaSyC8Ue06XPvGXo1XTloewPvDRBWtK5tDAj8',authDomain:'leon-beach-volleyball.firebaseapp.com',databaseURL:'https://leon-beach-volleyball-default-rtdb.firebaseio.com',projectId:'leon-beach-volleyball',storageBucket:'leon-beach-volleyball.firebasestorage.app',messagingSenderId:'937804799976',appId:'1:937804799976:web:02121e68655b4febeb8e5d'};

  var boot=document.getElementById('cs-boot');
  function esc(s){
    return String(s==null?'':s).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function notFound(){
    if(!boot) return;
    boot.innerHTML='<div class="inner">'
      +'<h1>School not found</h1>'
      +'<p>We could not find a CourtSense program at this link.</p>'
      +'<p>Double-check the address, or contact your coach for the correct link.</p>'
      +'</div>';
  }

  // Branded coming-soon page. Same overlay element, repainted in the school's
  // primary color. Logo comes from the courtsense_school_logos/<slug> node when the
  // config's logo flag is 'firebase'; otherwise the school's teamEmoji stands in.
  function renderSignup(cfg,slug){
    var bg=(cfg.colors && cfg.colors.primary) || '#082A4F';
    var name=cfg.displayName || cfg.schoolName || 'CourtSense';
    document.documentElement.style.background=bg;
    function paint(logoHtml){
      if(!boot) return;
      boot.className='cs-boot cs-signup';
      boot.style.background=bg;
      boot.innerHTML='<div class="inner">'
        +'<div class="cs-logo">'+logoHtml+'</div>'
        +'<h1>'+esc(name)+'</h1>'
        +'<div class="cs-sub">Beach Volleyball</div>'
        +'<p class="cs-msg">Player signups open soon. Check back.</p>'
        +'<a class="cs-powered" href="https://courtsense.app">Powered by CourtSense</a>'
        +'</div>';
    }
    function emoji(){ return '<div class="cs-emoji">'+esc(cfg.teamEmoji||'🏐')+'</div>'; }
    if(cfg.logo==='firebase'){
      firebase.database().ref('courtsense_school_logos/'+slug).once('value').then(function(snap){
        var url=snap.val();
        if(typeof url==='string' && url){ paint('<img src="'+esc(url)+'" alt="'+esc(name)+'">'); }
        else{ paint(emoji()); }
      }).catch(function(){ paint(emoji()); });
    }else if(cfg.logo){
      // Legacy filename logo (e.g. 'leon-logo.png') lives in the school's shell folder
      // at /<slug>/<logo>. If it 404s (a folderless school), fall back to the emoji.
      paint('<img src="/'+esc(slug)+'/'+esc(cfg.logo)+'" alt="'+esc(name)+'">');
      var img=boot && boot.querySelector('.cs-logo img');
      if(img){
        img.onerror=function(){ this.onerror=null; paint(emoji()); };
        if(img.complete && !img.naturalWidth){ img.onerror(); }
      }
    }else{
      paint(emoji());
    }
  }

  try{
    // Slug = first path segment; second segment 'signup' switches to the coming-soon
    // page. Tolerant of trailing slash and index.html on either path.
    var clean=location.pathname.replace(/index\.html$/i,'').replace(/^\/+|\/+$/g,'');
    var parts=clean.split('/');
    var slug=(parts[0]||'').toLowerCase();
    var isSignup=(parts[1]||'').toLowerCase()==='signup';
    if(!slug){ notFound(); return; }

    firebase.initializeApp(FB_CONFIG);
    firebase.database().ref('courtsense_school_configs/'+slug).once('value').then(function(snap){
      var cfg=snap.val();
      if(!cfg || typeof cfg!=='object'){ notFound(); return; }
      if(isSignup){ renderSignup(cfg,slug); return; }
      // Re-attach the shared fbConfig (stripped when configs were migrated to Firebase),
      // publish the config, remove the overlay, then load app.js. app.js's own initFB
      // guards on firebase.apps.length, so it reuses the app already initialized above.
      cfg.fbConfig=FB_CONFIG;
      window.SCHOOL_CONFIG=cfg;
      if(boot && boot.parentNode) boot.parentNode.removeChild(boot);
      var s=document.createElement('script');
      s.src='/app.js?v=1.1.105';
      document.body.appendChild(s);
    }).catch(function(){ notFound(); });
  }catch(e){ notFound(); }
})();
</script>
</body>
</html>
